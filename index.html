<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>正方形陣取りゲーム</title>

<style>

body{
text-align:center;
font-family:Arial;
background:linear-gradient(#ffe6f2,#e6f3ff);
}

#instructions{
background:white;
width:400px;
margin:auto;
margin-top:50px;
padding:20px;
border-radius:15px;
box-shadow:0 0 10px rgba(0,0,0,0.2);
}

canvas{
display:none;
background:white;
border-radius:15px;
box-shadow:0 0 10px rgba(0,0,0,0.2);
margin-top:20px;
}

button{
padding:10px 20px;
border:none;
border-radius:10px;
background:#ff8fb8;
color:white;
font-size:16px;
cursor:pointer;
}

</style>
</head>

<body>

<h1>⬜正方形陣取りゲーム⬜</h1>

<div id="instructions">

<h2>遊び方</h2>

<p>
① 点と点の間をクリックすると線が引けます。<br><br>

② 四角形（□）が完成すると、そのマスが自分のものになります。<br><br>

③ 赤があなた、青がコンピューターです。<br><br>

④ 最後に四角形が多い人が勝ちです！
</p>

<button onclick="startGame()">ゲームスタート</button>

</div>

<canvas id="game" width="400" height="400"></canvas>

<script>

function startGame(){

document.getElementById("instructions").style.display="none";
document.getElementById("game").style.display="block";

draw();

}

const canvas=document.getElementById("game");
const ctx=canvas.getContext("2d");

let grid=5;
let spacing=70;

function draw(){

ctx.clearRect(0,0,400,400);

for(let y=0;y<grid;y++){
for(let x=0;x<grid;x++){

ctx.fillStyle="#444";
ctx.beginPath();
ctx.arc(50+x*spacing,50+y*spacing,5,0,Math.PI*2);
ctx.fill();

}
}

}

</script>

</body>
</html>
