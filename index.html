<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>三角陣取りゲーム</title>

<style>
body{
text-align:center;
font-family:Arial;
background:#eef6ff;
}

canvas{
background:white;
border:2px solid #444;
margin-top:20px;
}

#turn{
font-size:18px;
margin-top:10px;
}
</style>
</head>

<body>

<h1>🔺三角陣取りゲーム（vsコンピューター）🔺</h1>
<p id="turn">あなた（赤）のターン</p>

<canvas id="game" width="500" height="400"></canvas>

<script>

const canvas=document.getElementById("game");
const ctx=canvas.getContext("2d");

let points=[];
let lines=[];
let selected=null;
let playerTurn=true;

for(let y=60;y<=300;y+=80){
for(let x=80;x<=400;x+=80){
points.push({x,y});
}
}

function draw(){

ctx.clearRect(0,0,500,400);

ctx.lineWidth=3;

lines.forEach(line=>{
ctx.strokeStyle=line.color;
ctx.beginPath();
ctx.moveTo(points[line.a].x,points[line.a].y);
ctx.lineTo(points[line.b].x,points[line.b].y);
ctx.stroke();
});

points.forEach(p=>{
ctx.fillStyle="black";
ctx.beginPath();
ctx.arc(p.x,p.y,5,0,Math.PI*2);
ctx.fill();
});

}

draw();

canvas.addEventListener("click",function(e){

if(!playerTurn) return;

const rect=canvas.getBoundingClientRect();
const mx=e.clientX-rect.left;
const my=e.clientY-rect.top;

let clicked=null;

points.forEach((p,i)=>{
let d=Math.hypot(mx-p.x,my-p.y);
if(d<10) clicked=i;
});

if(clicked===null) return;

if(selected===null){
selected=clicked;
}else{

if(selected===clicked){
selected=null;
return;
}

lines.push({a:selected,b:clicked,color:"red"});
selected=null;

playerTurn=false;
document.getElementById("turn").textContent="コンピューターのターン";

draw();

setTimeout(computerMove,800);

}

});

function computerMove(){

let a=Math.floor(Math.random()*points.length);
let b=Math.floor(Math.random()*points.length);

while(a===b){
b=Math.floor(Math.random()*points.length);
}

lines.push({a:a,b:b,color:"blue"});

playerTurn=true;
document.getElementById("turn").textContent="あなた（赤）のターン";

draw();

}

</script>

</body>
</html>
